<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FishLog - Bite Forecast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 pb-10">

  <header class="bg-indigo-900 text-white p-6 text-center shadow-lg mb-6">
    <h1 class="text-3xl font-bold tracking-tight">Bite Probability</h1>
    <p class="text-indigo-200 text-sm mt-1">48-Hour Forecast Prediction • Geneva, NY</p>
    <div class="mt-4 flex gap-2 justify-center flex-wrap" id="nav"></div>
  </header>

  <main class="max-w-4xl mx-auto px-4 space-y-6">
    <section class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
      <h2 class="text-xl font-bold text-indigo-950 mb-4">Probability of Success (%)</h2>
      <div class="relative h-64 w-full">
        <canvas id="forecastChart"></canvas>
      </div>
      <div id="predictionSummary" class="mt-4 p-4 bg-indigo-50 rounded-lg text-sm text-indigo-900 font-medium text-center">
        Analyzing atmospheric conditions...
      </div>
    </section>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
        <p class="text-[10px] font-bold uppercase text-slate-400">Pressure</p>
        <p id="trend-baro" class="text-lg font-bold">--</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
        <p class="text-[10px] font-bold uppercase text-slate-400">Moon</p>
        <p id="trend-moon" class="text-lg font-bold">--</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
        <p class="text-[10px] font-bold uppercase text-slate-400">Precip</p>
        <p id="trend-precip" class="text-lg font-bold">--</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
        <p class="text-[10px] font-bold uppercase text-slate-400">Temp</p>
        <p id="trend-temp" class="text-lg font-bold">--</p>
      </div>
    </div>
  </main>

  <script>
    // Configuration for Geneva, NY
    const LAT = 42.8689, LON = -76.9774;
    
    // Prediction Weights (Based on common angling physics)
    const WEIGHTS = {
      pressureDrop: 40, // Falling baro is high probability
      moonPhase: 25,    // Full/New moon influence
      precip: 20,       // Light rain often triggers bites
      tempRange: 15     // Optimal water/air temp
    };

    async function getForecast() {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,relative_humidity_2m,precipitation,surface_pressure,weather_code&temperature_unit=fahrenheit&forecast_days=2`;
      const res = await fetch(url);
      return await res.json();
    }

    function calculateBiteProbability(hourData, prevHourData) {
      let score = 30; // Base probability

      // 1. Barometric Pressure Trend
      if (prevHourData && hourData.pressure < prevHourData.pressure) score += WEIGHTS.pressureDrop;
      
      // 2. Precipitation (Light rain 0.1-0.5 is ideal)
      if (hourData.precip > 0 && hourData.precip < 0.5) score += WEIGHTS.precip;

      // 3. Temperature (Ideal 55-75°F for many local species)
      if (hourData.temp >= 55 && hourData.temp <= 75) score += WEIGHTS.tempRange;

      return Math.min(score, 100);
    }

    async function init() {
      const data = await getForecast();
      const labels = [];
      const probabilities = [];

      for (let i = 1; i < 48; i++) {
        const hour = {
          temp: data.hourly.temperature_2m[i],
          pressure: data.hourly.surface_pressure[i],
          precip: data.hourly.precipitation[i]
        };
        const prev = { pressure: data.hourly.surface_pressure[i-1] };
        
        const prob = calculateBiteProbability(hour, prev);
        const time = new Date(data.hourly.time[i] * 1000).getHours();
        
        labels.push(`${time}:00`);
        probabilities.push(prob);
      }

      // Update Dashboard Factors
      document.getElementById('trend-baro').innerText = data.hourly.surface_pressure[0] < data.hourly.surface_pressure[12] ? "Falling 📉" : "Stable";
      document.getElementById('trend-temp').innerText = `${Math.round(data.hourly.temperature_2m[0])}°F`;
      document.getElementById('trend-precip').innerText = data.hourly.precipitation[0] > 0 ? "Yes 🌧️" : "None";

      new Chart(document.getElementById('forecastChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Bite Probability %',
            data: probabilities,
            borderColor: '#4f46e5',
            backgroundColor: 'rgba(79, 70, 229, 0.2)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: { y: { min: 0, max: 100 } }
        }
      });
    }

    init();
  </script>
</body>
</html>
