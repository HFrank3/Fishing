<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1e1b4b" />
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FishLog" />
  <link rel="apple-touch-icon" href="https://scontent-bos5-1.cdninstagram.com/v/t51.2885-19/417958140_348114848001203_7605986349907024479_n.jpg?stp=dst-jpg_s150x150_tt6&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby4xMDgwLmMyIn0&_nc_ht=scontent-bos5-1.cdninstagram.com&_nc_cat=111&_nc_oc=Q6cZ2QGvPHaHInqhHSC06z5j945Wmc06HbIG6Dq7J1ELzTgzK5FtZ1Y2KsqYLTs9oaPEDIc&_nc_ohc=SmsY5x6iV7wQ7kNvwEAwADd&_nc_gid=yBOGZ-5UJsBQoNEmvZOGYg&edm=AOQ1c0wBAAAA&ccb=7-5&oh=00_Afw1rz3aPKC0VDhePH7C-gzHMUWx52EU9RjobUsySeM7-Q&oe=69AB7BE3&_nc_sid=8b3546">

  <title>Group Fishing Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #catchList { max-height: 60vh; overflow-y: auto; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans pb-10">

  <header class="bg-indigo-900 text-white p-6 text-center shadow-lg mb-6">
    <h1 class="text-3xl font-bold tracking-tight">Group Fishing Log</h1>
    <p class="text-indigo-200 text-sm mt-1">Shared Catch Tracker • Geneva, NY</p>
    <div class="mt-4 flex gap-2 justify-center">
      <a href="index.html" class="px-4 py-2 bg-indigo-500 rounded-lg text-sm font-semibold">Catch Log</a>
      <a href="gallery.html" class="px-4 py-2 bg-indigo-700 hover:bg-indigo-600 rounded-lg text-sm font-semibold transition">Gallery</a>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4">
    <form id="catchForm" class="bg-white p-5 rounded-xl shadow-md border border-slate-200 space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Your Name</label>
        <input type="text" id="name" placeholder="e.g. John" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" required />
      </div>
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Target Species</label>
        <input type="text" id="species" placeholder="e.g. Lake Trout" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" required />
      </div>
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Lure / Bait Used</label>
        <input type="text" id="lure" placeholder="e.g. Silver Spoon" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" required />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Weight (lbs)</label>
          <input type="number" id="weight" placeholder="e.g. 4.5" step="0.1" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Length (in)</label>
          <input type="number" id="length" placeholder="e.g. 18" step="0.1" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Fishing Spot</label>
        <input type="text" id="spot" placeholder="e.g. North Bay" class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>
      <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
        <span>Record Catch</span>
        <div id="loadingSpinner" class="loader hidden"></div>
      </button>
    </form>

    <div class="mt-8 flex justify-between items-end px-1">
      <h2 class="text-xl font-bold text-slate-800">Recent Activity</h2>
      <span class="text-xs text-slate-500 uppercase font-semibold">Group Feed</span>
    </div>

    <div class="mt-4 flex gap-2 flex-wrap mb-4">
      <input type="text" id="filterSpecies" placeholder="Filter by species..." class="flex-1 min-w-[120px] p-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
      <input type="text" id="filterUser" placeholder="Filter by user..." class="flex-1 min-w-[120px] p-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
      <button id="clearFilters" class="px-3 py-2 text-sm bg-slate-300 hover:bg-slate-400 rounded-lg font-semibold">Reset</button>
    </div>
    
    <div id="catchList" class="mt-4 space-y-4">
      <div class="text-center py-10 text-slate-400">Loading collective data...</div>
    </div>
  </main>

  <!-- Catch Details Modal -->
  <div id="catchModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <script>
    // --- CONFIGURATION ---
    const DB_URL = 'https://fishing-app-4b031-default-rtdb.firebaseio.com/catches.json';
    const COMMENTS_URL = 'https://fishing-app-4b031-default-rtdb.firebaseio.com/comments.json';

    let allCatches = [];
    let filterSpecies = '';
    let filterUser = '';

    function getCurrentUser() {
      return document.getElementById('name')?.value || localStorage.getItem('currentUser') || null;
    }

    function getTimeOfDay(timestamp) {
      const hour = new Date(timestamp).getHours();
      if (hour >= 5 && hour < 12) return 'Morning';
      if (hour >= 12 && hour < 17) return 'Afternoon';
      if (hour >= 17 && hour < 21) return 'Evening';
      return 'Night';
    }

    // --- DATABASE OPERATIONS ---
    async function loadCatches() {
      try {
        const res = await fetch(DB_URL);
        const data = await res.json();
        if (!data) return [];
        allCatches = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                     .sort((a, b) => b.timestamp - a.timestamp);
        return allCatches;
      } catch (e) {
        console.error("Load failed:", e);
        return [];
      }
    }

    async function loadComments(catchId) {
      try {
        const res = await fetch(`https://fishing-app-4b031-default-rtdb.firebaseio.com/comments/${catchId}.json`);
        const data = await res.json();
        if (!data) return [];
        return Object.keys(data).map(key => ({ id: key, ...data[key] }))
                     .sort((a, b) => a.timestamp - b.timestamp);
      } catch (e) {
        console.error("Load comments failed:", e);
        return [];
      }
    }

    async function saveComment(catchId, user, text) {
      await fetch(`https://fishing-app-4b031-default-rtdb.firebaseio.com/comments/${catchId}.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, text, timestamp: Date.now() })
      });
    }

    async function saveCatch(data) {
      await fetch(DB_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    }

    async function deleteEntry(id, owner) {
      const currentUser = getCurrentUser();
      if (currentUser !== owner) {
        alert("You can only delete your own catches!");
        return;
      }
      if (!confirm("Remove this catch from the group log?")) return;
      const deleteUrl = `https://fishing-app-4b031-default-rtdb.firebaseio.com/catches/${id}.json`;
      await fetch(deleteUrl, { method: 'DELETE' });
      renderUI();
    }

    // --- PHYSICS & WEATHER LOGIC ---
    function getMoonDetails(date) {
      const synodicMonth = 29.530588853;
      const refNewMoon = new Date("2000-01-06T18:14:00Z");
      const diffDays = (date.getTime() - refNewMoon.getTime()) / (1000 * 60 * 60 * 24);
      const phase = (diffDays / synodicMonth) % 1;
      const normPhase = phase < 0 ? phase + 1 : phase;
      const illumination = (1 - Math.cos(2 * Math.PI * normPhase)) / 2;
      const pct = Math.round(illumination * 100);

      if (illumination > 0.96) return `Full Moon 🌕 (${pct}%)`;
      if (normPhase < 0.25) return `Waxing Crescent 🌒 (${pct}%)`;
      if (normPhase < 0.50) return `Waxing Gibbous 🌔 (${pct}%)`;
      if (normPhase < 0.75) return `Waning Gibbous 🌖 (${pct}%)`;
      return `Waning Crescent 🌘 (${pct}%)`;
    }

    async function fetchWeather(lat, lon) {
      if (!lat || !lon) return { temp: 'N/A', pressure: 'N/A', hum: 'N/A' };
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relative_humidity_2m,surface_pressure&timeformat=unixtime&temperature_unit=fahrenheit`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        const now = Math.floor(Date.now() / 1000);
        let idx = data.hourly.time.findIndex(t => t >= now);
        if (idx === -1) idx = 0;
        return {
          temp: `${Math.round(data.hourly.temperature_2m[idx])}°F`,
          pressure: `${Math.round(data.hourly.surface_pressure[idx])} hPa`,
          hum: `${data.hourly.relative_humidity_2m[idx]}%`
        };
      } catch (e) { return { temp: 'Err', pressure: 'Err', hum: 'Err' }; }
    }

    function getGPS() {
      return new Promise(res => {
        if (!navigator.geolocation) return res(null);
        navigator.geolocation.getCurrentPosition(p => res({lat: p.coords.latitude, lon: p.coords.longitude}), () => res(null));
      });
    }

    // --- STATISTICS ---
    function calculateStats(catches) {
      const stats = {
        totalCatches: catches.length,
        bySpecies: {},
        byUser: {},
        byTime: { Morning: 0, Afternoon: 0, Evening: 0, Night: 0 },
        bySpot: {},
        avgWeight: 0,
        largestCatch: null
      };

      let totalWeight = 0;
      let catchesWithWeight = 0;

      catches.forEach(c => {
        stats.bySpecies[c.species] = (stats.bySpecies[c.species] || 0) + 1;
        stats.byUser[c.name] = (stats.byUser[c.name] || 0) + 1;
        stats.byTime[getTimeOfDay(c.timestamp)]++;
        if (c.spot) stats.bySpot[c.spot] = (stats.bySpot[c.spot] || 0) + 1;
        
        if (c.weight) {
          totalWeight += parseFloat(c.weight);
          catchesWithWeight++;
        }
        if (!stats.largestCatch || (c.weight && parseFloat(c.weight) > parseFloat(stats.largestCatch.weight || 0))) {
          stats.largestCatch = c;
        }
      });

      stats.avgWeight = catchesWithWeight > 0 ? (totalWeight / catchesWithWeight).toFixed(1) : 'N/A';
      return stats;
    }

    // --- UI RENDERING ---
    async function renderUI() {
      const list = document.getElementById('catchList');
      const items = await loadCatches();
      const currentUser = getCurrentUser();

      const filtered = items.filter(item => {
        const speciesMatch = !filterSpecies || item.species.toLowerCase().includes(filterSpecies.toLowerCase());
        const userMatch = !filterUser || item.name.toLowerCase().includes(filterUser.toLowerCase());
        return speciesMatch && userMatch;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="text-center py-10 text-slate-400">No catches found.</div>';
        return;
      }

      const stats = calculateStats(filtered);

      list.innerHTML = filtered.map(item => `
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm animate-in fade-in duration-500 cursor-pointer hover:shadow-md transition" onclick="showCatchModal('${item.id}')">
          ${currentUser === item.name ? `<button onclick="event.stopPropagation(); deleteEntry('${item.id}', '${item.name}')" class="float-right text-slate-300 hover:text-red-500 transition">✕</button>` : ''}
          <div class="flex justify-between items-start mb-2">
            <div>
              <h3 class="text-lg font-bold text-indigo-950">${item.species}</h3>
              <p class="text-sm text-slate-600 font-medium">✨ ${item.lure}</p>
              <p class="text-xs text-slate-500 mt-1">🎣 ${item.name}${item.spot ? ` • ${item.spot}` : ''}</p>
            </div>
            <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">
              ${new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
            </span>
          </div>
          <div class="grid grid-cols-2 gap-y-2 gap-x-4 border-t pt-3 mt-2">
            ${item.weight ? `<div class="text-xs text-slate-500 font-semibold">⚖️ WEIGHT: <span class="text-slate-900">${item.weight} lbs</span></div>` : ''}
            ${item.length ? `<div class="text-xs text-slate-500 font-semibold">📏 LENGTH: <span class="text-slate-900">${item.length} in</span></div>` : ''}
            <div class="text-xs text-slate-500 font-semibold">🌡️ TEMP: <span class="text-slate-900">${item.weather?.temp}</span></div>
            <div class="text-xs text-slate-500 font-semibold">⏲️ BARO: <span class="text-slate-900">${item.weather?.pressure}</span></div>
            <div class="text-xs text-slate-500 font-semibold">💧 HUM: <span class="text-slate-900">${item.weather?.hum}</span></div>
            <div class="text-xs text-slate-500 font-semibold">🌑 MOON: <span class="text-slate-900 text-[10px]">${item.moon}</span></div>
            <div class="col-span-2 text-[10px] text-indigo-400 font-mono italic">
              📍 ${item.loc ? `${item.loc.lat.toFixed(4)}, ${item.loc.lon.toFixed(4)}` : 'Location Private'}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function showCatchModal(id) {
      const catch_ = allCatches.find(c => c.id === id);
      if (!catch_) return;

      const comments = await loadComments(id);
      const modal = document.getElementById('catchModal');
      const content = document.getElementById('modalContent');

      const date = new Date(catch_.timestamp);
      
      content.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="text-2xl font-bold text-indigo-950">${catch_.species}</h2>
            <p class="text-sm text-slate-600">🎣 Caught by <span class="font-semibold">${catch_.name}</span></p>
          </div>
          <button onclick="document.getElementById('catchModal').classList.add('hidden')" class="text-2xl text-slate-300 hover:text-slate-500">✕</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 p-4 bg-slate-50 rounded-lg">
          <div><span class="text-xs font-bold text-slate-500 uppercase">Species</span><p class="text-lg font-bold">${catch_.species}</p></div>
          <div><span class="text-xs font-bold text-slate-500 uppercase">Lure</span><p class="text-lg font-bold">${catch_.lure}</p></div>
          ${catch_.weight ? `<div><span class="text-xs font-bold text-slate-500 uppercase">Weight</span><p class="text-lg font-bold">${catch_.weight} lbs</p></div>` : ''}
          ${catch_.length ? `<div><span class="text-xs font-bold text-slate-500 uppercase">Length</span><p class="text-lg font-bold">${catch_.length} in</p></div>` : ''}
          ${catch_.spot ? `<div><span class="text-xs font-bold text-slate-500 uppercase">Spot</span><p class="text-lg font-bold">${catch_.spot}</p></div>` : ''}
          <div><span class="text-xs font-bold text-slate-500 uppercase">Time of Day</span><p class="text-lg font-bold">${getTimeOfDay(catch_.timestamp)}</p></div>
          <div><span class="text-xs font-bold text-slate-500 uppercase">Date & Time</span><p class="text-sm font-bold">${date.toLocaleString()}</p></div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6 p-4 bg-blue-50 rounded-lg">
          <div class="text-center"><span class="block text-2xl">🌡️</span><p class="text-xs text-slate-600">${catch_.weather?.temp}</p></div>
          <div class="text-center"><span class="block text-2xl">💧</span><p class="text-xs text-slate-600">${catch_.weather?.hum}</p></div>
          <div class="text-center"><span class="block text-2xl">⏲️</span><p class="text-xs text-slate-600">${catch_.weather?.pressure}</p></div>
        </div>

        <div class="mb-6 p-4 bg-purple-50 rounded-lg">
          <p class="text-xs font-bold text-slate-500 uppercase mb-2">Moon Phase</p>
          <p class="text-sm">${catch_.moon}</p>
        </div>

        <div class="mb-6 p-4 bg-indigo-50 rounded-lg">
          <p class="text-xs font-bold text-slate-500 uppercase mb-2">Location</p>
          <p class="text-sm font-mono">${catch_.loc ? `${catch_.loc.lat.toFixed(6)}, ${catch_.loc.lon.toFixed(6)}` : 'Location Private'}</p>
        </div>

        <div class="border-t pt-4">
          <h3 class="font-bold text-slate-800 mb-3">Comments (${comments.length})</h3>
          <div class="space-y-3 mb-4 max-h-64 overflow-y-auto">
            ${comments.map(c => `
              <div class="bg-slate-50 p-3 rounded-lg">
                <p class="text-xs font-bold text-indigo-600">${c.user}</p>
                <p class="text-sm text-slate-700">${c.text}</p>
              </div>
            `).join('')}
          </div>
          <div class="flex gap-2">
            <input type="text" id="commentInput" placeholder="Add a comment..." class="flex-1 p-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
            <button onclick="addComment('${id}')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700">Post</button>
          </div>
        </div>
      `;

      modal.classList.remove('hidden');
    }

    async function addComment(catchId) {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      const user = getCurrentUser();

      if (!text || !user) {
        alert('Please enter a name and comment');
        return;
      }

      await saveComment(catchId, user, text);
      input.value = '';
      await showCatchModal(catchId);
    }

    // --- FORM HANDLING ---
    document.getElementById('catchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const spinner = document.getElementById('loadingSpinner');
      
      btn.disabled = true;
      spinner.classList.remove('hidden');

      const name = document.getElementById('name').value;
      localStorage.setItem('currentUser', name);

      const loc = await getGPS();
      const weather = await fetchWeather(loc?.lat, loc?.lon);
      const timestamp = Date.now();
      const moon = getMoonDetails(new Date(timestamp));

      await saveCatch({
        name,
        species: document.getElementById('species').value,
        lure: document.getElementById('lure').value,
        weight: document.getElementById('weight').value || null,
        length: document.getElementById('length').value || null,
        spot: document.getElementById('spot').value || null,
        loc, weather, moon, timestamp
      });

      e.target.reset();
      document.getElementById('name').value = name;
      await renderUI();
      
      btn.disabled = false;
      spinner.classList.add('hidden');
    });

    // --- FILTER HANDLING ---
    document.getElementById('filterSpecies').addEventListener('input', (e) => {
      filterSpecies = e.target.value;
      renderUI();
    });

    document.getElementById('filterUser').addEventListener('input', (e) => {
      filterUser = e.target.value;
      renderUI();
    });

    document.getElementById('clearFilters').addEventListener('click', () => {
      filterSpecies = '';
      filterUser = '';
      document.getElementById('filterSpecies').value = '';
      document.getElementById('filterUser').value = '';
      renderUI();
    });

    // Initial Load
    document.addEventListener('DOMContentLoaded', () => {
      const savedName = localStorage.getItem('currentUser');
      if (savedName) {
        document.getElementById('name').value = savedName;
      }
      renderUI();
    });
  </script>
</body>
</html>
