  <div id="catchModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">

  <script>
    // --- CONFIGURATION ---
    const DB_URL = 'https://fishing-app-4b031-default-rtdb.firebaseio.com/catches.json';
    const COMMENTS_URL = 'https://fishing-app-4b031-default-rtdb.firebaseio.com/comments.json';

    let allCatches = [];
    let filterSpecies = '';
    let filterUser = '';
    let isOnline = navigator.onLine;

    function getCurrentUser() {
      return document.getElementById('name')?.value || localStorage.getItem('currentUser') || null;
    }

    function getTimeOfDay(timestamp) {
      const hour = new Date(timestamp).getHours();
      if (hour >= 5 && hour < 12) return 'Morning';
      if (hour >= 12 && hour < 17) return 'Afternoon';
      if (hour >= 17 && hour < 21) return 'Evening';
      return 'Night';
    }

    // --- UI UTILS ---
    function showToast(message, duration = 3000) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.className = 'bg-indigo-600 text-white px-4 py-2 rounded shadow-lg animate-in fade-in duration-200';
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => container.removeChild(toast), 500);
      }, duration);
    }

    function updateDatalist(id, items) {
      const list = document.getElementById(id);
      const unique = [...new Set(items.filter(Boolean))];
      list.innerHTML = unique.map(v => `<option value="${v}"></option>`).join('');
    }

    // --- OFFLINE STORAGE ---
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('FishingAppDB', 1);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('offlineCatches')) {
            db.createObjectStore('offlineCatches', { keyPath: 'timestamp' });
          }
        };
      });
    }

    async function saveOfflineCatch(catchData) {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(['offlineCatches'], 'readwrite');
          const store = transaction.objectStore('offlineCatches');
          const request = store.add(catchData);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve();
        });
      } catch (e) {
        console.error('Failed to save offline catch:', e);
      }
    }

    async function getOfflineCatches() {
      try {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(['offlineCatches'], 'readonly');
          const store = transaction.objectStore('offlineCatches');
          const request = store.getAll();
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result || []);
        });
      } catch (e) {
        console.error('Failed to get offline catches:', e);
        return [];
      }
    }

    async function syncOfflineCatches() {
      const offlineCatches = await getOfflineCatches();
      for (const catchData of offlineCatches) {
        try {
          await saveCatch(catchData);
          const db = await openDB();
          new Promise((resolve) => {
            const transaction = db.transaction(['offlineCatches'], 'readwrite');
            const store = transaction.objectStore('offlineCatches');
            store.delete(catchData.timestamp);
            transaction.oncomplete = () => resolve();
          });
        } catch (e) {
          console.error('Failed to sync catch:', e);
        }
      }
    }

    // --- DATABASE OPERATIONS ---
    // 1. Updated Database Operation
async function loadCatches() {
  try {
    const res = await fetch(DB_URL);
    if (!res.ok) throw new Error('Network response was not ok');
    const data = await res.json();
    
    // Safety check: if database is empty, set to empty array
    if (!data) {
      allCatches = [];
    } else {
      allCatches = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                   .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }
    
    // Merge offline catches if applicable
    if (!isOnline) {
      const offlineCatches = await getOfflineCatches();
      allCatches = [...offlineCatches, ...allCatches].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }
    
    return allCatches;
  } catch (e) {
    console.error("Load failed:", e);
    // Fallback to offline data so the screen doesn't stay white
    allCatches = await getOfflineCatches();
    return allCatches;
  }
}

    async function loadComments(catchId) {
      try {
        const res = await fetch(`https://fishing-app-4b031-default-rtdb.firebaseio.com/comments/${catchId}.json`);
        const data = await res.json();
        if (!data) return [];
        return Object.keys(data).map(key => ({ id: key, ...data[key] }))
                     .sort((a, b) => a.timestamp - b.timestamp);
      } catch (e) {
        console.error("Load comments failed:", e);
        return [];
      }
    }

    async function saveComment(catchId, user, text) {
      if (!isOnline) {
        alert('Cannot add comments while offline');
        return;
      }
      await fetch(`https://fishing-app-4b031-default-rtdb.firebaseio.com/comments/${catchId}.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, text, timestamp: Date.now() })
      });
    }

    async function saveCatch(data) {
      try {
        const res = await fetch(DB_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Save failed');
        return true;
      } catch (e) {
        console.error('Save catch error:', e);
        if (!isOnline) {
          await saveOfflineCatch(data);
          return true;
        }
        throw e;
      }
    }

    async function deleteEntry(id, owner) {
      const currentUser = getCurrentUser();
      if (currentUser !== owner) {
        alert("You can only delete your own catches!");
        return;
      }
      if (!confirm("Remove this catch from the group log?")) return;
      const deleteUrl = `https://fishing-app-4b031-default-rtdb.firebaseio.com/catches/${id}.json`;
      await fetch(deleteUrl, { method: 'DELETE' });
      await loadCatches(); // Refresh local list
      renderUI();
      showToast('Catch deleted');
    }

    // --- PHYSICS & WEATHER LOGIC ---
    function getMoonDetails(date) {
      const synodicMonth = 29.530588853;
      const refNewMoon = new Date("2000-01-06T18:14:00Z");
      const diffDays = (date.getTime() - refNewMoon.getTime()) / (1000 * 60 * 60 * 24);
      const phase = (diffDays / synodicMonth) % 1;
      const normPhase = phase < 0 ? phase + 1 : phase;
      const illumination = (1 - Math.cos(2 * Math.PI * normPhase)) / 2;
      const pct = Math.round(illumination * 100);

      if (illumination > 0.96) return `Full Moon 🌕 (${pct}%)`;
      if (normPhase < 0.25) return `Waxing Crescent 🌒 (${pct}%)`;
      if (normPhase < 0.50) return `Waxing Gibbous 🌔 (${pct}%)`;
      if (normPhase < 0.75) return `Waning Gibbous 🌖 (${pct}%)`;
      return `Waning Crescent 🌘 (${pct}%)`;
    }

    async function fetchWeather(lat, lon, timestamp) {
      if (!lat || !lon) return { temp: 'N/A', pressure: 'N/A', hum: 'N/A', pressureTrend: '' };
      
      const catchDate = new Date(timestamp);
      
      // Format to local YYYY-MM-DD
      const year = catchDate.getFullYear();
      const month = String(catchDate.getMonth() + 1).padStart(2, '0');
      const day = String(catchDate.getDate()).padStart(2, '0');
      const dateStr = `${year}-${month}-${day}`;
      
      const now = new Date();
      const nowStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      
      let url;
      if (dateStr === nowStr) {
        // Forecast for today (includes past_hours=1 so we always have a previous hour to compare)
        url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relative_humidity_2m,surface_pressure&timeformat=unixtime&temperature_unit=fahrenheit&past_hours=1`;
      } else {
        // Historical API - pull the day before too so we can check the trend of the very first hour
        const prevDayDate = new Date(timestamp - 86400000);
        const pYear = prevDayDate.getFullYear();
        const pMonth = String(prevDayDate.getMonth() + 1).padStart(2, '0');
        const pDay = String(prevDayDate.getDate()).padStart(2, '0');
        const prevDateStr = `${pYear}-${pMonth}-${pDay}`;
        
        url = `https://historical-forecast-api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&start_date=${prevDateStr}&end_date=${dateStr}&hourly=temperature_2m,relative_humidity_2m,surface_pressure&timeformat=unixtime&temperature_unit=fahrenheit`;
      }

      try {
        const res = await fetch(url);
        const data = await res.json();
        
        const targetUnix = Math.floor(timestamp / 1000);
        let closestIdx = 0;
        let minDiff = Infinity;
        
        data.hourly.time.forEach((t, idx) => {
          const diff = Math.abs(t - targetUnix);
          if (diff < minDiff) {
            minDiff = diff;
            closestIdx = idx;
          }
        });

        // Calculate the Pressure Trend
        let trend = "";
        if (closestIdx > 0) {
          const currentP = data.hourly.surface_pressure[closestIdx];
          const prevP = data.hourly.surface_pressure[closestIdx - 1];
          if (currentP < prevP) trend = "Falling 📉";
          else if (currentP > prevP) trend = "Rising 📈";
          else trend = "Stable ➖";
        }

        return {
          temp: `${Math.round(data.hourly.temperature_2m[closestIdx])}°F`,
          pressure: `${Math.round(data.hourly.surface_pressure[closestIdx])} hPa`,
          hum: `${data.hourly.relative_humidity_2m[closestIdx]}%`,
          pressureTrend: trend
        };
      } catch (e) { 
        console.error("Weather Error:", e);
        return { temp: 'Err', pressure: 'Err', hum: 'Err', pressureTrend: '' }; 
      }
    }

    function getGPS() {
      return new Promise(res => {
        if (!navigator.geolocation) return res(null);
        navigator.geolocation.getCurrentPosition(p => res({lat: p.coords.latitude, lon: p.coords.longitude}), () => res(null));
      });
    }

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > 1200) {
              height *= 1200 / width;
              width = 1200;
            }
            
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

async function uploadPhotoToFirebase(compressedDataUrl) {
      try {
        const timestamp = Date.now();
        const fileName = `photo_${timestamp}`;
        // Pointing to Realtime Database
        const dbUrl = `https://fishing-app-4b031-default-rtdb.firebaseio.com/photoImages/${fileName}.json`;
        
        // Upload the base64 string directly
        const response = await fetch(dbUrl, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: compressedDataUrl })
        });

        if (!response.ok) throw new Error('Upload failed');
        
        // Return the base64 string so the form can save it to the catch log
        return compressedDataUrl;
      } catch (e) {
        console.error("Photo upload error:", e);
        return null;
      }
    }

    // --- STATISTICS ---
    function calculateStats(catches) {
      const stats = {
        totalCatches: catches.length,
        bySpecies: {},
        byUser: {},
        byTime: { Morning: 0, Afternoon: 0, Evening: 0, Night: 0 },
        bySpot: {},
        avgWeight: 0,
        largestCatch: null
      };

      let totalWeight = 0;
      let catchesWithWeight = 0;

      catches.forEach(c => {
        stats.bySpecies[c.species] = (stats.bySpecies[c.species] || 0) + 1;
        stats.byUser[c.name] = (stats.byUser[c.name] || 0) + 1;
        stats.byTime[getTimeOfDay(c.timestamp)]++;
        if (c.spot) stats.bySpot[c.spot] = (stats.bySpot[c.spot] || 0) + 1;
        
        if (c.weight) {
          totalWeight += parseFloat(c.weight);
          catchesWithWeight++;
        }
        if (!stats.largestCatch || (c.weight && parseFloat(c.weight) > parseFloat(stats.largestCatch.weight || 0))) {
          stats.largestCatch = c;
        }
      });

      stats.avgWeight = catchesWithWeight > 0 ? (totalWeight / catchesWithWeight).toFixed(1) : 'N/A';
      return stats;
    }

    // --- UI RENDERING ---
function renderUI() {
  const list = document.getElementById('catchList');
  if (!list) return;

  const currentUser = getCurrentUser();

  // Guard clause: if allCatches isn't an array yet, stop here
  if (!Array.isArray(allCatches)) {
    list.innerHTML = '<div class="text-center py-10 text-slate-400">Initializing data...</div>';
    return;
  }

  const filtered = allCatches.filter(item => {
    // String safety: ensure these are never null/undefined before calling toLowerCase
    const s = (item.species || "").toLowerCase();
    const n = (item.name || "").toLowerCase();
    const fs = (filterSpecies || "").toLowerCase();
    const fu = (filterUser || "").toLowerCase();
    
    return s.includes(fs) && n.includes(fu);
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="text-center py-10 text-slate-400">No catches found matching filters.</div>';
    return;
  }
      const stats = calculateStats(filtered);

      updateDatalist('speciesList', allCatches.map(c => c.species));
      updateDatalist('lureList', allCatches.map(c => c.lure));
      updateDatalist('spotList', allCatches.map(c => c.spot));

      list.innerHTML = filtered.map(item => {
        const isSecretAndNotMine = item.secretSpot && item.name !== currentUser;
        
        return `
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm animate-in fade-in duration-500 cursor-pointer hover:shadow-md transition" onclick="showCatchModal('${item.id}')">
          ${currentUser === item.name ? `<button onclick="event.stopPropagation(); deleteEntry('${item.id}', '${item.name}')" class="float-right text-slate-300 hover:text-red-500 transition">✕</button>` : ''}
          ${item.photo ? `<div class="mb-3 rounded-lg overflow-hidden bg-slate-200 h-40"><img src="${item.photo}" alt="Catch" class="w-full h-full object-cover" /></div>` : ''}
          <div class="flex justify-between items-start mb-2">
            <div>
              <h3 class="text-lg font-bold text-indigo-950">${item.species}</h3>
              ${item.lure ? `<p class="text-sm text-slate-600 font-medium">✨ ${item.lure}</p>` : ''}
              <p class="text-xs text-slate-500 mt-1">🎣 ${item.name}${item.spot ? ` • ${item.spot}` : ''}</p>
            </div>
            <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">
              ${new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
            </span>
          </div>
          <div class="grid grid-cols-2 gap-y-2 gap-x-4 border-t pt-3 mt-2">
            ${item.weight ? `<div class="text-xs text-slate-500 font-semibold">⚖️ WEIGHT: <span class="text-slate-900">${item.weight} lbs</span></div>` : ''}
            ${item.length ? `<div class="text-xs text-slate-500 font-semibold">📏 LENGTH: <span class="text-slate-900">${item.length} in</span></div>` : ''}
            <div class="text-xs text-slate-500 font-semibold">🌡️ TEMP: <span class="text-slate-900">${item.weather?.temp}</span></div>
            <div class="text-xs text-slate-500 font-semibold">⏲️ BARO: <span class="text-slate-900">${item.weather?.pressure} ${item.weather?.pressureTrend ? `<span class="text-indigo-600 font-bold ml-1">${item.weather.pressureTrend}</span>` : ''}</span></div>
            <div class="text-xs text-slate-500 font-semibold">💧 HUM: <span class="text-slate-900">${item.weather?.hum}</span></div>
            <div class="text-xs text-slate-500 font-semibold">🌑 MOON: <span class="text-slate-900 text-[10px]">${item.moon}</span></div>
            <div class="col-span-2 text-[10px] text-indigo-400 font-mono italic">
              ${isSecretAndNotMine ? '🔒 Location Private' : `📍 ${item.loc ? `${item.loc.lat.toFixed(4)}, ${item.loc.lon.toFixed(4)}` : 'Location Private'}`}
            </div>
          </div>
        </div>
      `}).join('');
    }

    async function showCatchModal(id) {
      const catch_ = allCatches.find(c => c.id === id);
      if (!catch_) return;

      const comments = await loadComments(id);
      const modal = document.getElementById('catchModal');
      const content = document.getElementById('modalContent');
      const date = new Date(catch_.timestamp);
      
      content.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="text-2xl font-bold text-indigo-950">${catch_.species}</h2>
            <p class="text-sm text-slate-600">🎣 Caught by <span class="font-semibold">${catch_.name}</span></p>
          </div>
          <button onclick="document.getElementById('catchModal').classList.add('hidden')" class="text-2xl text-slate-300 hover:text-slate-500">✕</button>
        </div>

        ${catch_.photo ? `<div class="mb-6 rounded-lg overflow-hidden bg-slate-200"><img src="${catch_.photo}" alt="Catch" class="w-full" /></div>` : ''}

        <div class="grid grid-cols-2 gap-4 mb-6 p-4 bg-slate-50 rounded-lg">
          <div><span class="text-xs font-bold text-slate-500 uppercase">Species</span><p class="text-lg font-bold">${catch_.species}</p></div>
          
          ${catch_.weight ? `${catch_.lure ? `<div><span class="text-xs font-bold text-slate-500 uppercase">Lure</span><p class="text-lg font-bold">${catch_.lure}</p></div>` : ''}<div><span class="text-xs font-bold text-slate-500 uppercase">Weight</span><p class="text-lg font-bold">${catch_.weight} lbs</p></div>` : ''}
          ${catch_.length ? `<div><span class="text-xs font-bold text-slate-500 uppercase">Length</span><p class="text-lg font-bold">${catch_.length} in</p></div>` : ''}
          ${catch_.spot ? `<div><span class="text-xs font-bold text-slate-500 uppercase">Spot</span><p class="text-lg font-bold">${catch_.spot}</p></div>` : ''}
          <div><span class="text-xs font-bold text-slate-500 uppercase">Time of Day</span><p class="text-lg font-bold">${getTimeOfDay(catch_.timestamp)}</p></div>
          <div><span class="text-xs font-bold text-slate-500 uppercase">Date & Time</span><p class="text-sm font-bold">${date.toLocaleString()}</p></div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6 p-4 bg-blue-50 rounded-lg">
          <div class="text-center"><span class="block text-2xl">🌡️</span><p class="text-xs text-slate-600">${catch_.weather?.temp}</p></div>
          <div class="text-center"><span class="block text-2xl">💧</span><p class="text-xs text-slate-600">${catch_.weather?.hum}</p></div>
          <div class="text-center"><span class="block text-2xl">⏲️</span><p class="text-xs text-slate-600">${catch_.weather?.pressure}</p></div>
        </div>

        <div class="mb-6 p-4 bg-purple-50 rounded-lg">
          <p class="text-xs font-bold text-slate-500 uppercase mb-2">Moon Phase</p>
          <p class="text-sm">${catch_.moon}</p>
        </div>

        <div class="mb-6 p-4 bg-indigo-50 rounded-lg">
          <div class="flex justify-between items-center mb-2">
            <p class="text-xs font-bold text-slate-500 uppercase">Location</p>
            ${catch_.secretSpot ? '<span class="text-xs font-bold text-red-500">🔒 Secret Spot</span>' : ''}
          </div>
          ${(!catch_.secretSpot || catch_.name === getCurrentUser()) && catch_.loc 
            ? `<div id="mapContainer" class="h-48 w-full rounded-lg z-0 relative"></div>` 
            : `<p class="text-sm font-mono text-slate-500">Coordinates hidden by angler</p>`
          }
        </div>

        <div class="border-t pt-4">
          <h3 class="font-bold text-slate-800 mb-3">Comments (${comments.length})</h3>
          <div class="space-y-3 mb-4 max-h-64 overflow-y-auto">
            ${comments.map(c => `
              <div class="bg-slate-50 p-3 rounded-lg">
                <p class="text-xs font-bold text-indigo-600">${c.user}</p>
                <p class="text-sm text-slate-700">${c.text}</p>
              </div>
            `).join('')}
          </div>
          <div class="flex gap-2">
            <input type="text" id="commentInput" placeholder="Add a comment..." class="flex-1 p-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
            <button onclick="addComment('${id}')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700">Post</button>
          </div>
        </div>
      `;

      modal.classList.remove('hidden');

      // Initialize Map if applicable
      if ((!catch_.secretSpot || catch_.name === getCurrentUser()) && catch_.loc) {
        setTimeout(() => {
          const mapContainer = document.getElementById('mapContainer');
          if (mapContainer) {
            // Leaflet requires removing previous instances if recreating
            if (mapContainer._leaflet_id) {
              mapContainer._leaflet_id = null;
              mapContainer.innerHTML = '';
            }
            const map = L.map('mapContainer').setView([catch_.loc.lat, catch_.loc.lon], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap'
            }).addTo(map);
            L.marker([catch_.loc.lat, catch_.loc.lon]).addTo(map).bindPopup('Caught here!').openPopup();
            
            // Fix map tiles rendering poorly inside modals
            setTimeout(() => map.invalidateSize(), 150);
          }
        }, 100);
      }
      list.innerHTML = filtered.map(item => { /* your existing template */ }).join('');
    }

    async function addComment(catchId) {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      const user = getCurrentUser();

      if (!text || !user) {
        alert('Please enter a name and comment');
        return;
      }

      await saveComment(catchId, user, text);
      input.value = '';
      await showCatchModal(catchId);
    }

    // --- FORM HANDLING ---
    document.getElementById('catchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const spinner = document.getElementById('loadingSpinner');
      const photoFile = document.getElementById('photoFile').files[0];
      
      btn.disabled = true;
      spinner.classList.remove('hidden');

      try {
        const name = document.getElementById('name').value;
        localStorage.setItem('currentUser', name);

        const loc = await getGPS();
        // Grabs custom time if set, otherwise uses current time
        const timeInput = document.getElementById('catchTime').value;
        const timestamp = timeInput ? new Date(timeInput).getTime() : Date.now();
        
        const moon = getMoonDetails(new Date(timestamp));
        // Pass the timestamp to our new weather function
        const weather = await fetchWeather(loc?.lat, loc?.lon, timestamp);

        let photoUrl = null;
        if (photoFile) {
          if (photoFile.size > 10 * 1024 * 1024) {
            throw new Error('Photo must be smaller than 10MB');
          }
          const compressed = await compressImage(photoFile);
          photoUrl = await uploadPhotoToFirebase(compressed);
          if (!photoUrl) {
            throw new Error('Failed to upload photo');
          }
        }

        const speciesVal = document.getElementById('species').value;
        const lureVal = document.getElementById('lure').value;
        const spotVal = document.getElementById('spot').value;
        const secretSpotVal = document.getElementById('secretSpot').checked;
        
        localStorage.setItem('last_species', speciesVal);
        localStorage.setItem('last_lure', lureVal);
        localStorage.setItem('last_spot', spotVal);

        await saveCatch({
          name,
          species: speciesVal,
          lure: lureVal,
          weight: document.getElementById('weight').value || null,
          length: document.getElementById('length').value || null,
          spot: spotVal || null,
          secretSpot: secretSpotVal,
          photo: photoUrl,
          loc, weather, moon, timestamp
        });

        e.target.reset();
        document.getElementById('name').value = name;
        
        // Refresh local data list and UI
        await loadCatches();
        renderUI();
        showToast('Catch recorded!');
        
        // Haptic Feedback for mobile devices
        if (navigator.vibrate) navigator.vibrate(50);
        
      } catch (error) {
        showToast(error.message || 'Error saving catch. Please try again.');
        console.error('Form submission error:', error);
      } finally {
        btn.disabled = false;
        spinner.classList.add('hidden');
      }
    });

    // --- FILTER HANDLING ---
    document.getElementById('filterSpecies').addEventListener('input', (e) => {
      filterSpecies = e.target.value;
      renderUI();
    });

    document.getElementById('filterUser').addEventListener('input', (e) => {
      filterUser = e.target.value;
      renderUI();
    });

    document.getElementById('clearFilters').addEventListener('click', () => {
      filterSpecies = '';
      filterUser = '';
      document.getElementById('filterSpecies').value = '';
      document.getElementById('filterUser').value = '';
      renderUI();
    });

    // Initial Load
    document.addEventListener('DOMContentLoaded', async () => {
      const savedName = localStorage.getItem('currentUser');
      if (savedName) document.getElementById('name').value = savedName;
      
      ['species','lure','spot'].forEach(field => {
        const val = localStorage.getItem('last_'+field);
        if (val) document.getElementById(field).value = val;
      });
      
      // Load from database once on startup, then render
      await loadCatches();
      renderUI();
    });

    // --- SERVICE WORKER & OFFLINE SUPPORT ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => {
          console.log('Service Worker registered');
          setInterval(async () => {
            if (isOnline) {
              await syncOfflineCatches();
            }
          }, 30000);
        })
        .catch(err => console.log('Service Worker registration failed:', err));
    }

    window.addEventListener('online', () => {
      isOnline = true;
      document.getElementById('offlineIndicator').classList.add('hidden');
      showToast('Back online – syncing catches');
      loadCatches().then(() => renderUI());
      syncOfflineCatches();
      if ('serviceWorker' in navigator && 'sync' in navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'SYNC_CATCHES' });
      }
    });

    window.addEventListener('offline', () => {
      isOnline = false;
      document.getElementById('offlineIndicator').classList.remove('hidden');
      showToast('You are offline – catches will be saved locally');
    });

    window.addEventListener('load', () => {
      if (!navigator.onLine) {
        document.getElementById('offlineIndicator').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
