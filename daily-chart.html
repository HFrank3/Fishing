<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FishLog - Weather Physics Chart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 pb-10">

  <header class="bg-indigo-900 text-white p-6 text-center shadow-lg mb-6">
    <h1 class="text-3xl font-bold tracking-tight">Weather Analysis</h1>
    <p class="text-indigo-200 text-sm mt-1">Pressure & Precipitation Trends • Geneva, NY</p>
  </header>

  <main class="max-w-4xl mx-auto px-4 space-y-6">
    
    <section class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
      <h2 class="text-xl font-bold text-indigo-950 mb-4 text-center">Catch Success vs. Pressure Trend</h2>
      <div class="relative h-64 w-full">
        <canvas id="weatherChart"></canvas>
      </div>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-indigo-50 p-5 rounded-xl border border-indigo-100 text-center">
        <h3 class="text-xs font-bold text-indigo-400 uppercase">Ideal Temp Range</h3>
        <p id="bestTemp" class="text-xl font-black text-indigo-900">Loading...</p>
      </div>
      
      <div class="bg-blue-50 p-5 rounded-xl border border-blue-100 text-center">
        <h3 class="text-xs font-bold text-blue-400 uppercase">Pressure State</h3>
        <p id="pressureTrend" class="text-xl font-black text-blue-900">Loading...</p>
      </div>

      <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 text-center text-white">
        <h3 class="text-xs font-bold text-slate-400 uppercase">Precipitation Effect</h3>
        <p id="precipStat" class="text-xl font-black">Loading...</p>
      </div>
    </div>
  </main>

  <script>
    const DB_URL = 'https://fishing-app-4b031-default-rtdb.firebaseio.com/catches.json';

    // Helper to strip units like "hPa" or "°F"
    const toNum = (str) => str ? parseFloat(str.replace(/[^\d.-]/g, '')) : null;

    async function loadWeatherData() {
      try {
        const res = await fetch(DB_URL);
        const data = await res.json();
        if (!data) return;

        const catches = Object.values(data);
        
        // --- 1. Environmental Calculations ---
        let lowPressureCatches = 0; // "Dropping"
        let highPressureCatches = 0; // "Rising/Steady"
        let tempSum = 0;
        let catchesWithTemp = 0;

        // Simple threshold for Geneva, NY (Standard Baro ~1013 hPa)
        catches.forEach(c => {
          const p = toNum(c.weather?.pressure);
          const t = toNum(c.weather?.temp);

          if (p) {
            p < 1013 ? lowPressureCatches++ : highPressureCatches++;
          }
          if (t) {
            tempSum += t;
            catchesWithTemp++;
          }
        });

        // --- 2. Update UI ---
        document.getElementById('bestTemp').textContent = catchesWithTemp > 0 
          ? `${Math.round(tempSum/catchesWithTemp)}°F Avg` : 'N/A';
        
        document.getElementById('pressureTrend').textContent = lowPressureCatches > highPressureCatches 
          ? 'Falling Baro 📉' : 'Steady/Rising 📈';
        
        document.getElementById('precipStat').textContent = "Active Feed"; // Placeholder for logic expansion

        // --- 3. Render Chart ---
        const ctx = document.getElementById('weatherChart').getContext('2d');
        
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Falling Pressure (<1013hPa)', 'Rising/Steady (>1013hPa)'],
            datasets: [{
              label: 'Catches',
              data: [lowPressureCatches, highPressureCatches],
              backgroundColor: ['#6366f1', '#94a3b8'],
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
          }
        });

      } catch (e) { console.error(e); }
    }
    document.addEventListener('DOMContentLoaded', loadWeatherData);
  </script>
</body>
</html>
